syntax = "proto3";

package telemetry ;


message MetricPayload {
    string container_id =1;
    float cpu_usage = 2;
    float ram_usage =3;
    float memory_usage=4;
    int64 timestamp = 5;
}

message LogPayload {
    string container_id = 1;
    string log_level = 2;         //"INFO ,ERROR"
    string message = 3;
    int64 timestamp = 4;
}

message AnomalyResponse {
    bool is_anomaly=1;
    float anomaly_score=2;
    string description=3;
    string action =4; //"BLOCK ,PASS ,RESTART_CONTAINER"
}

service AnomalyDetector{
    rpc  StreamMetrics (stream MetricPayload) returns (stream AnomalyResponse);
    rpc AnalyzeLog (stream LogPayload) returns (stream MetricPayload);
}
